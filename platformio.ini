; PlatformIO Project Configuration File
; Waveshare ESP32-S3-Touch-LCD-2.8B
; Display: ST7701S RGB 480x640, Touch: GT911, Landscape mode

; Host-native unit tests — no hardware needed
; Run with: pio test -e native
[env:native]
platform = native
build_src_filter = -<*>
build_flags =
    -std=c11
    -Wall
    -Wno-unused-function
    -I src/core
    -lm

[env:waveshare_28b]
platform = espressif32@6.12.0
board = esp32-s3-devkitc-1
framework = espidf

monitor_speed = 115200
upload_speed = 921600

board_build.flash_size = 16MB
board_build.flash_mode = qio
board_build.partitions = partitions.csv

; Inject git-describe as APP_VERSION_STRING via SCons (see pre_version.py).
; Falls back to the manual triple in src/version.h when no tags exist.
extra_scripts =
    pre:pre_version.py
    pre:pre_web_bundle.py
