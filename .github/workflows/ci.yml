name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Native unit tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PlatformIO
        run: pip install platformio

      - name: Run native tests
        run: pio test -e native

  firmware-build:
    name: Firmware compile check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # needed for git describe in build_flags

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Cache PlatformIO toolchain
        uses: actions/cache@v4
        with:
          path: ~/.platformio
          key: pio-${{ runner.os }}-${{ hashFiles('platformio.ini') }}
          restore-keys: pio-${{ runner.os }}-

      - name: Install PlatformIO
        run: pip install platformio

      - name: Build React app
        run: cd web && npm ci && npm run build

      - name: Embed web bundle into C header
        run: python scripts/embed_web.py

      - name: Generate secrets.h
        env:
          WIFI_SSID: ${{ secrets.WIFI_SSID }}
          WIFI_PASSWORD: ${{ secrets.WIFI_PASSWORD }}
        run: |
          cat > src/secrets.h << EOF
          #pragma once
          #define DEFAULT_WIFI_SSID     "${WIFI_SSID}"
          #define DEFAULT_WIFI_PASSWORD "${WIFI_PASSWORD}"
          EOF

      - name: Compile firmware
        run: pio run -e waveshare_28b
