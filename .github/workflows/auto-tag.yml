name: Auto-tag

on:
  push:
    branches: [main]
    paths:
      - src/version.h   # only runs when the version file changes

jobs:
  tag:
    name: Create version tag
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Read version from src/version.h
        id: version
        run: |
          MAJOR=$(grep '#define APP_VERSION_MAJOR' src/version.h | awk '{print $3}')
          MINOR=$(grep '#define APP_VERSION_MINOR' src/version.h | awk '{print $3}')
          PATCH=$(grep '#define APP_VERSION_PATCH' src/version.h | awk '{print $3}')
          echo "tag=v${MAJOR}.${MINOR}.${PATCH}" >> "$GITHUB_OUTPUT"

      - name: Create and push tag (if new)
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          if git ls-remote --tags origin | grep -q "refs/tags/${TAG}$"; then
            echo "Tag ${TAG} already exists — skipping."
          else
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git tag "${TAG}"
            git push origin "${TAG}"
            echo "Created tag ${TAG}"
          fi
