name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build firmware
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # needed for git describe to resolve the tag

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PlatformIO
        run: pip install platformio

      - name: Generate secrets.h
        env:
          WIFI_SSID: ${{ secrets.WIFI_SSID }}
          WIFI_PASSWORD: ${{ secrets.WIFI_PASSWORD }}
        run: |
          cat > src/secrets.h << EOF
          #pragma once
          #define DEFAULT_WIFI_SSID     "${WIFI_SSID}"
          #define DEFAULT_WIFI_PASSWORD "${WIFI_PASSWORD}"
          EOF

      - name: Build firmware
        run: pio run -e waveshare_28b

      - name: Rename binary
        run: |
          mkdir -p dist
          cp .pio/build/waveshare_28b/firmware.bin dist/gbwui-${{ github.ref_name }}.bin

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/gbwui-${{ github.ref_name }}.bin
          generate_release_notes: true
