name: Release

# Triggers when version.h is updated on main (via auto-tag path),
# OR when a v* tag is pushed manually.
#
# The "tag" job creates the tag from version.h if it doesn't exist yet.
# The "build" job always runs and publishes the GitHub release + .bin asset.

on:
  push:
    branches: [main]
    paths:
      - src/version.h
    tags:
      - "v*"

jobs:
  tag:
    name: Create version tag
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      tag: ${{ steps.version.outputs.tag }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read version from src/version.h
        id: version
        run: |
          MAJOR=$(grep '#define APP_VERSION_MAJOR' src/version.h | awk '{print $3}')
          MINOR=$(grep '#define APP_VERSION_MINOR' src/version.h | awk '{print $3}')
          PATCH=$(grep '#define APP_VERSION_PATCH' src/version.h | awk '{print $3}')
          TAG="v${MAJOR}.${MINOR}.${PATCH}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Detected version: ${TAG}"

      - name: Create and push tag (if new)
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          if git ls-remote --tags origin | grep -q "refs/tags/${TAG}$"; then
            echo "Tag ${TAG} already exists — skipping."
          else
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git tag "${TAG}"
            git push origin "${TAG}"
            echo "Created tag ${TAG}"
          fi

  build:
    name: Build and release firmware
    runs-on: ubuntu-latest
    needs: tag
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # needed for git describe to resolve the tag

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package.json

      - name: Install PlatformIO
        run: pip install platformio

      - name: Build React app
        run: cd web && npm install && npm run build

      - name: Embed web bundle into C header
        run: python scripts/embed_web.py

      - name: Generate secrets.h
        env:
          WIFI_SSID: ${{ secrets.WIFI_SSID }}
          WIFI_PASSWORD: ${{ secrets.WIFI_PASSWORD }}
        run: |
          cat > src/secrets.h << EOF
          #pragma once
          #define DEFAULT_WIFI_SSID     "${WIFI_SSID}"
          #define DEFAULT_WIFI_PASSWORD "${WIFI_PASSWORD}"
          EOF

      - name: Build firmware
        run: pio run -e waveshare_28b

      - name: Stage binary
        run: |
          mkdir -p dist
          cp .pio/build/waveshare_28b/firmware.bin dist/gbwui-${{ needs.tag.outputs.tag }}.bin

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.tag.outputs.tag }}
          files: dist/gbwui-${{ needs.tag.outputs.tag }}.bin
          generate_release_notes: true
